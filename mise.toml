[tasks.build]
description = "Build Ghostty Flatpak inside dev container"
run = """
set -e
printf '%s' "$(git rev-parse --short HEAD 2>/dev/null || echo '0000000')" > .git-sha
docker compose run --build --rm builder mise run _flatpak-build
"""

[tasks.install]
description = "Install the built Flatpak locally on host"
run = """
set -e
if [ ! -f dist/build/com.mitchellh.ghostty.flatpak ]; then
  echo "No flatpak found. Run: mise run build"
  exit 1
fi
flatpak install --user --bundle --reinstall -y dist/build/com.mitchellh.ghostty.flatpak
"""

[tasks.zig-build]
description = "Run zig build inside dev container (fast compile check, no flatpak)"
run = "docker compose run --build --rm builder zig build -Demit-macos-app=false"

[tasks.zig-test]
description = "Run zig tests inside dev container. Pass -Dtest-filter=<name> via ZIG_ARGS env or positional args"
run = """
docker compose run --build --rm builder zig build test ${ZIG_ARGS:-} "$@"
"""

[tasks.shell]
description = "Open interactive shell in dev container"
run = "docker compose run --rm builder bash"

[tasks.clean]
description = "Remove build artifacts and container caches"
run = """
rm -rf dist/build flatpak/builddir flatpak/repo .flatpak-builder
docker compose down -v
"""

[tasks.remotes-setup]
description = "Configure git remotes: upstream=ghostty-org/ghostty, origin=blurayne/ghostty"
run = """
set -e

setup_remote() {
  local name=$1 url=$2 current
  current=$(git remote get-url "$name" 2>/dev/null) || true
  if [ -z "$current" ]; then
    git remote add "$name" "$url"
    echo "  $name  added → $url"
  elif [ "$current" = "$url" ]; then
    echo "  $name  ok    $url"
  else
    git remote set-url "$name" "$url"
    echo "  $name  fixed $current → $url"
  fi
}

setup_remote upstream git@github.com:ghostty-org/ghostty.git
setup_remote origin   git@github.com:blurayne/ghostty.git

echo ""
git remote -v
"""

[tasks.upstream-merge]
description = "Fetch upstream (ghostty-org/ghostty) and merge into fork main, then push"
run = """
set -e

git fetch upstream -q
MERGE_BASE=$(git merge-base HEAD upstream/main)
UPSTREAM_AHEAD=$(git rev-list --count "${MERGE_BASE}"..upstream/main)

if [ "$UPSTREAM_AHEAD" -eq 0 ]; then
  echo "Already up to date with upstream."
  exit 0
fi

echo "$UPSTREAM_AHEAD new commit(s) from upstream:"
git log --oneline --format="  %h  %ci  %s" "${MERGE_BASE}"..upstream/main
echo ""

# Attempt the merge; on conflict, abort and give clear instructions
if ! git merge upstream/main --no-edit -m "chore: merge upstream ghostty-org/ghostty $(git rev-parse --short upstream/main)"; then
  echo ""
  echo "ERROR: merge conflict — resolve manually, then:"
  echo "  git add <files>"
  echo "  git merge --continue"
  echo "  git push origin main"
  exit 1
fi

echo ""
git push origin main
echo ""
echo "Done. Merged $UPSTREAM_AHEAD upstream commit(s) and pushed."
"""

[tasks.upstream-log]
description = "Show commits on upstream (ghostty-org/ghostty) since our fork point"
run = """
set -e
git fetch upstream -q 2>/dev/null || echo "[using cached refs]"
MERGE_BASE=$(git merge-base HEAD upstream/main)
AHEAD=$(git rev-list --count "${MERGE_BASE}"..upstream/main)
echo "Upstream has $AHEAD new commit(s) since fork point ($(git log -1 --format='%h %ci' "$MERGE_BASE")):"
echo ""
git log --oneline --format="%C(yellow)%h%Creset  %C(dim)%ci%Creset  %s" \
    "${MERGE_BASE}"..upstream/main
"""

[tasks.fork-status]
description = "Show last common commit with upstream + version tags for upstream and fork"
run = """
set -e

# Fetch latest refs (non-fatal — works offline with cached refs)
echo "Fetching remotes..."
git fetch upstream --tags -q 2>/dev/null && echo "  upstream  OK" || echo "  upstream  [skipped — using cached refs]"
git fetch origin --tags -q 2>/dev/null && echo "  origin    OK" || echo "  origin    [skipped — using cached refs]"

# ── Last common commit ───────────────────────────────────────────────────────
MERGE_BASE=$(git merge-base HEAD upstream/main)
MB_SHORT=$(git log -1 --format="%h" "$MERGE_BASE")
MB_DATE=$(git log -1 --format="%ci" "$MERGE_BASE")
MB_MSG=$(git log -1 --format="%s" "$MERGE_BASE")

echo ""
echo "┌─ Last common commit ─────────────────────────────────────────────────"
printf "│  hash    %s\\n" "$MB_SHORT ($MERGE_BASE)"
printf "│  date    %s\\n" "$MB_DATE"
printf "│  subject %s\\n" "$MB_MSG"
echo "│"

# ── Upstream version at fork point ──────────────────────────────────────────
UPSTREAM_TAG=$(git describe --tags --abbrev=0 "$MERGE_BASE" 2>/dev/null || true)

echo "├─ Upstream (ghostty-org/ghostty) ────────────────────────────────────"
if [ -n "$UPSTREAM_TAG" ]; then
  TAG_COMMIT=$(git rev-list -n 1 "$UPSTREAM_TAG")
  TAG_DATE=$(git log -1 --format="%ci" "$UPSTREAM_TAG")
  printf "│  tag     %s\\n" "$UPSTREAM_TAG"
  printf "│  tagged  %s  (%s)\\n" "$TAG_DATE" "$(git log -1 --format='%h' "$UPSTREAM_TAG")"
  if [ "$TAG_COMMIT" = "$MERGE_BASE" ]; then
    echo "│  fork branches from exactly this tag"
  else
    DELTA=$(git rev-list --count "${UPSTREAM_TAG}".."${MERGE_BASE}")
    echo "│  fork point is $DELTA commit(s) ahead of this tag on upstream main"
  fi
  # How far upstream has moved since fork point
  UPSTREAM_AHEAD=$(git rev-list --count "${MERGE_BASE}"..upstream/main)
  UPSTREAM_HEAD_DATE=$(git log -1 --format="%ci" upstream/main)
  UPSTREAM_LATEST_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "(none)")
  printf "│  upstream has %s new commit(s) since fork point\\n" "$UPSTREAM_AHEAD"
  printf "│  upstream latest tag  %s  (HEAD %s)\\n" "$UPSTREAM_LATEST_TAG" "$UPSTREAM_HEAD_DATE"
else
  echo "│  (no tag found reachable from fork point)"
fi
echo "│"

# ── Fork status ─────────────────────────────────────────────────────────────
OUR_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)
OUR_AHEAD=$(git rev-list --count "${MERGE_BASE}"..HEAD)
OUR_HEAD_SHORT=$(git log -1 --format="%h" HEAD)
OUR_HEAD_DATE=$(git log -1 --format="%ci" HEAD)
OUR_HEAD_MSG=$(git log -1 --format="%s" HEAD)

echo "└─ Fork (blurayne/ghostty) ────────────────────────────────────────────"
if [ -n "$OUR_TAG" ]; then
  OUR_TAG_DATE=$(git log -1 --format="%ci" "$OUR_TAG")
  printf "   latest tag  %s  (%s)\\n" "$OUR_TAG" "$OUR_TAG_DATE"
else
  echo "   latest tag  (none)"
fi
printf "   %s commit(s) ahead of fork point\\n" "$OUR_AHEAD"
printf "   HEAD  %s  %s\\n" "$OUR_HEAD_SHORT" "$OUR_HEAD_DATE"
printf "         %s\\n" "$OUR_HEAD_MSG"
"""

[tasks._flatpak-build]
description = "Build flatpak bundle — run inside container only"
run = """
set -e
# .git is hidden from flatpak-builder via a tmpfs mount in docker-compose.yml
# so flatpak-builder treats the workspace as a plain directory and skips git ops.
# .git-sha is written on the host by the `build` task before this runs.

# Start system D-Bus if not already running.
# machine-id and messagebus user are set up in the Dockerfile.
if [ ! -S /app/var/run/dbus/system_bus_socket ] && [ ! -S /run/dbus/system_bus_socket ]; then
  dbus-daemon --system --fork
fi

# rofiles-fuse (used by flatpak-builder) requires a session bus.
if [ -z "$DBUS_SESSION_BUS_ADDRESS" ]; then
  export DBUS_SESSION_BUS_ADDRESS=$(dbus-daemon --session --fork --print-address)
fi

# --force-clean only clears builddir output, NOT the .flatpak-builder module
# cache, so dependency builds are reused between runs.
flatpak-builder \
  --force-clean \
  --disable-rofiles-fuse \
  --repo=flatpak/repo \
  flatpak/builddir \
  flatpak/com.mitchellh.ghostty.yml

mkdir -p dist/build
flatpak build-bundle \
  flatpak/repo \
  dist/build/com.mitchellh.ghostty.flatpak \
  com.mitchellh.ghostty \
  tip
"""
