name: Flatpak Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# One build at a time; a new push cancels the in-progress one.
concurrency:
  group: flatpak-release
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # flatpak-builder detects .git and tries git operations inside the
      # sandbox, which fail because it can't resolve the remote. Hide it for
      # the duration of the build — same workaround used by the local Docker
      # build script.
      - name: Hide .git from flatpak-builder
        run: mv .git .git.ci-bak

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6.5
        with:
          bundle: com.mitchellh.ghostty
          manifest-path: flatpak/com.mitchellh.ghostty.yml
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.arch }}
          arch: ${{ matrix.arch }}
          verbose: true

      - name: Restore .git
        if: always()
        run: mv .git.ci-bak .git 2>/dev/null || true

      # The flatpak-builder action already uploads the bundle as an artifact
      # named "com.mitchellh.ghostty-<arch>.flatpak" (because `bundle:` is set
      # above), so no explicit upload-artifact step is needed. The release job
      # consumes those artifacts by that name.

  release:
    name: Publish tip release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Each build's bundle arrives as an artifact named
      # "com.mitchellh.ghostty-<arch>.flatpak" containing the file
      # "com.mitchellh.ghostty.flatpak". Without merge-multiple, each artifact
      # is extracted into its own directory named after the artifact.
      - uses: actions/download-artifact@v4
        with:
          pattern: com.mitchellh.ghostty-*

      # Each artifact directory holds a single bundle file (named
      # "com.mitchellh.ghostty", no extension, since that's the `bundle:` value),
      # so glob the lone file and give it a distinct, arch-suffixed name.
      - name: Stage bundles with arch-suffixed names
        run: |
          set -euo pipefail
          mkdir -p dist
          mv com.mitchellh.ghostty-x86_64.flatpak/*  dist/com.mitchellh.ghostty-x86_64.flatpak
          mv com.mitchellh.ghostty-aarch64.flatpak/* dist/com.mitchellh.ghostty-aarch64.flatpak
          ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          name: Ghostty Personal Fork — Tip
          prerelease: true
          tag_name: tip
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          body: |
            Automated build from `main` — ${{ github.sha }}

            **Install (x86_64)**
            ```
            flatpak install --user --bundle com.mitchellh.ghostty-x86_64.flatpak
            ```
            **Install (ARM64)**
            ```
            flatpak install --user --bundle com.mitchellh.ghostty-aarch64.flatpak
            ```
          files: |
            dist/com.mitchellh.ghostty-x86_64.flatpak
            dist/com.mitchellh.ghostty-aarch64.flatpak
