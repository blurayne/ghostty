name: Build Check

# Fast compile check for the Linux/GTK app on every push and PR (docs-only
# changes excluded), so code is verified in minutes instead of waiting for the
# full Flatpak release build. Runs in a Debian Trixie container that mirrors the
# project's own build recipe (src/build/docker/debian/Dockerfile), so all the
# GTK dependency package names resolve. No org secrets required.
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# One check per ref; a new push cancels the in-progress one.
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig-build:
    name: zig build (Linux/GTK)
    runs-on: ubuntu-latest
    container: debian:trixie
    timeout-minutes: 30
    steps:
      # Install before checkout so git (required by actions/checkout) and the
      # build dependencies are present. Package set mirrors the Debian recipe.
      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get -qq update
          apt-get -qq -y --no-install-recommends install \
            blueprint-compiler build-essential ca-certificates curl git \
            libbz2-dev libonig-dev libxml2-utils pandoc \
            libadwaita-1-dev libgtk-4-dev libgtk4-layer-shell-dev xz-utils

      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          ZIG_VERSION=$(sed -n -E 's/^[[:space:]]*\.?minimum_zig_version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' build.zig.zon)
          echo "Using Zig $ZIG_VERSION"
          curl -fL -o /tmp/zig.tar.xz \
            "https://ziglang.org/download/$ZIG_VERSION/zig-$(uname -m)-linux-$ZIG_VERSION.tar.xz"
          tar -xf /tmp/zig.tar.xz -C /opt
          ln -sf "/opt/zig-$(uname -m)-linux-$ZIG_VERSION/zig" /usr/local/bin/zig
          zig version

      - name: Build (compile check)
        run: zig build -Doptimize=Debug -Dcpu=baseline
